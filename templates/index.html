<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBER DEMAND PREDICTION</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="form-container card">
            <h1>UBER DEMAND PREDICTION</h1>
            <form action="/predict" method="post" class="prediction-form">
                <div class="field-group">
                    <label for="time">Time</label>
                    <input type="datetime-local" id="time" name="time" required>
                </div>

                <div class="field-group">
                    <label for="pickup_location_id">Pickup Location ID (1-265)</label>
                    <input type="number" id="pickup_location_id" name="pickup_location_id" min="1" max="265" required>
                </div>

                <div class="field-group">
                    <label for="trip_distance">Trip Distance (miles)</label>
                    <input type="number" id="trip_distance" name="trip_distance" min="0.0" step="0.1" required>
                </div>

                <button type="submit" class="button submit-btn">Predict</button>
            </form>
            {% if prediction_text %}
            <div class="result">
                <h2>Prediction Result:</h2>
                <p>{{ prediction_text }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
