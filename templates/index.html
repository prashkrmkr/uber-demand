<html>
<head>
    <title>UBER DEMAND PREDICTION</title>
</head>
<body>
    <div class="form-container">
        <h1>UBER DEMAND PREDICTION</h1>
        <form action="/predict" method="post">
            <label for="pickup_time">Pickup Time in hour only:</label>
            <input type="number" id="pickup_time" name="pickup_time" min="0" max="23" required><br><br>

            <label for="day">Pickup Day:</label>
            <input type="number" id="pickup_day" name="pickup_day" min="1" max="31" required><br><br>

            <label for="month">Month:</label>
            <select id="month" name="month" required>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select><br><br>

            <label for="day">Day of the Week:</label>
            <select id="day" name="day" required>
                <option value="0">Monday</option>
                <option value="1">Tuesday</option>
                <option value="2">Wednesday</option>
                <option value="3">Thursday</option>
                <option value="4">Friday</option>
                <option value="5">Saturday</option>
                <option value="6">Sunday</option>
            </select><br><br>

            <label for="pickup_location_id">Pickup Location ID (1-265):</label>
            <input type="number" id="pickup_location_id" name="pickup_location_id" min="1" max="265" required><br><br>

            <label for="part_of_day">Part of Day:</label>
            <select id="part_of_day" name="part_of_day" required>
                <option value="0">Morning</option>
                <option value="1">Afternoon</option>
                <option value="2">Evening</option>
                <option value="3">Night</option>
                <option value="4">Midnight</option>
            </select><br><br>

            <label for="weekend">Weekend:</label>
            <select id="weekend" name="weekend" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <label for="trip_distance">Trip Distance (miles):</label>
            <input type="number" id="trip_distance" name="trip_distance" min="0.0" step="0.1" required><br><br>

            <label for="start of the month">Start of the Month:</label>
            <select id="start_of_the_month" name="start_of_the_month" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <label for="end of the month">End of the Month:</label>
            <select id="end_of_the_month" name="end_of_the_month" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <input type="submit" value="Predict">
        </form>
        {% if prediction_text %}
        <div class="result">
            <h2>Prediction Result:</h2>
            <p>{{ prediction_text }}</p>
        {% endif %}
    </div>
</body>
</html>
